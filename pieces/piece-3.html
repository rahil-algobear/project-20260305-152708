<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioluminescent Bloom — Deep Ocean Bioluminescence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            color: white;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .overlay h1 {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }
        
        .controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        
        .controls.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        button {
            background: rgba(255, 0, 110, 0.2);
            border: 1px solid rgba(255, 0, 110, 0.5);
            color: #ff006e;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        button:hover {
            background: rgba(255, 0, 110, 0.3);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
        }
        
        .back-link {
            color: #ff006e;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }
        
        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>
    
    <div class="overlay" id="overlay">
        <a href="../index.html" class="back-link">← Back to Gallery</a>
        <h1>Bioluminescent Bloom</h1>
        <p>Reaction-Diffusion • Mouse seeds new growth patterns</p>
    </div>
    
    <div class="controls" id="controls">
        <button id="fullscreenBtn">Fullscreen</button>
    </div>
    
    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        
        if (!gl) {
            alert('WebGL not supported');
            throw new Error('WebGL not supported');
        }
        
        const isWebGL2 = gl instanceof WebGL2RenderingContext;
        
        const vertexShaderSource = isWebGL2 ? `#version 300 es
        in vec2 a_position;
        void main() {
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
        ` : `
        attribute vec2 a_position;
        void main() {
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
        `;
        
        const fragmentShaderSource = isWebGL2 ? `#version 300 es
        precision highp float;
        
        uniform float u_time;
        uniform vec2 u_resolution;
        uniform vec2 u_mouse;
        
        out vec4 fragColor;
        
        const vec3 color1 = vec3(1.0, 0.0, 0.431);      // #ff006e
        const vec3 color2 = vec3(0.482, 0.184, 1.0);    // #7b2fff
        const vec3 deepBlue = vec3(0.039, 0.055, 0.153); // #0a0e27
        
        float hash(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }
        
        float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            
            float a = hash(i);
            float b = hash(i + vec2(1.0, 0.0));
            float c = hash(i + vec2(0.0, 1.0));
            float d = hash(i + vec2(1.0, 1.0));
            
            return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
        }
        
        float fbm(vec2 p) {
            float value = 0.0;
            float amplitude = 0.5;
            float frequency = 1.0;
            
            for (int i = 0; i < 5; i++) {
                value += amplitude * noise(p * frequency);
                frequency *= 2.0;
                amplitude *= 0.5;
            }
            
            return value;
        }
        
        float reactionDiffusion(vec2 p, float t) {
            float scale = 8.0;
            vec2 q = p * scale;
            
            float a = fbm(q + t * 0.1);
            float b = fbm(q + vec2(5.2, 1.3) + t * 0.15);
            
            vec2 laplacian = vec2(0.0);
            float eps = 0.1;
            
            laplacian.x = fbm(q + vec2(eps, 0.0)) + fbm(q - vec2(eps, 0.0)) - 2.0 * a;
            laplacian.y = fbm(q + vec2(0.0, eps)) + fbm(q - vec2(0.0, eps)) - 2.0 * a;
            
            float feed = 0.055;
            float kill = 0.062;
            
            float reaction = a * b * b;
            float diffusion = length(laplacian) * 0.5;
            
            return a - reaction + feed * (1.0 - a) + diffusion;
        }
        
        void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution.xy;
            vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.x, u_resolution.y);
            
            float t = u_time * 0.2;
            
            vec2 mousePos = (u_mouse * 2.0 - 1.0) * vec2(u_resolution.x / u_resolution.y, 1.0);
            float mouseDist = length(p - mousePos);
            
            vec2 warpedP = p;
            warpedP += vec2(
                sin(t * 0.5 + p.y * 3.0) * 0.1,
                cos(t * 0.4 + p.x * 3.0) * 0.1
            );
            
            float rd = reactionDiffusion(warpedP, t);
            
            float pattern = 0.0;
            for (int i = 0; i < 3; i++) {
                float fi = float(i);
                vec2 offset = vec2(sin(t + fi * 2.0), cos(t + fi * 1.5)) * 0.3;
                float layer = reactionDiffusion(warpedP + offset, t + fi * 0.5);
                pattern += layer * (1.0 / (fi + 1.0));
            }
            
            pattern = pattern / 3.0;
            pattern = smoothstep(0.3, 0.7, pattern);
            
            float coral = fbm(warpedP * 6.0 + t * 0.1);
            coral = pow(coral, 2.0);
            
            vec3 col = deepBlue;
            
            vec3 patternColor = mix(color1, color2, fract(pattern * 3.0 + t * 0.2));
            col = mix(col, patternColor, pattern * 0.8);
            
            float coralMask = smoothstep(0.4, 0.6, coral);
            col = mix(col, color1 * 1.2, coralMask * 0.5);
            
            float edges = length(vec2(
                dFdx(pattern),
                dFdy(pattern)
            ));
            col += mix(color1, color2, fract(edges * 10.0)) * edges * 5.0;
            
            float pulse = 0.5 + 0.5 * sin(t * 2.0 + pattern * 10.0);
            col += patternColor * pulse * pattern * 0.3;
            
            if (mouseDist < 0.3) {
                float mouseGlow = exp(-mouseDist * 8.0);
                col += color1 * mouseGlow * 0.5;
                
                float ripple = sin(mouseDist * 20.0 - t * 5.0) * 0.5 + 0.5;
                col += color2 * ripple * mouseGlow * 0.3;
            }
            
            float vignette = 1.0 - length(uv - 0.5) * 0.8;
            col *= vignette;
            
            col = pow(col, vec3(0.9));
            
            fragColor = vec4(col, 1.0);
        }
        ` : `
        precision highp float;
        
        uniform float u_time;
        uniform vec2 u_resolution;
        uniform vec2 u_mouse;
        
        const vec3 color1 = vec3(1.0, 0.0, 0.431);
        const vec3 color2 = vec3(0.482, 0.184, 1.0);
        const vec3 deepBlue = vec3(0.039, 0.055, 0.153);
        
        float hash(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }
        
        float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            
            float a = hash(i);
            float b = hash(i + vec2(1.0, 0.0));
            float c = hash(i + vec2(0.0, 1.0));
            float d = hash(i + vec2(1.0, 1.0));
            
            return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
        }
        
        float fbm(vec2 p) {
            float value = 0.0;
            float amplitude = 0.5;
            float frequency = 1.0;
            
            for (int i = 0; i < 5; i++) {
                value += amplitude * noise(p * frequency);
                frequency *= 2.0;
                amplitude *= 0.5;
            }
            
            return value;
        }
        
        float reactionDiffusion(vec2 p, float t) {
            float scale = 8.0;
            vec2 q = p * scale;
            
            float a = fbm(q + t * 0.1);
            float b = fbm(q + vec2(5.2, 1.3) + t * 0.15);
            
            vec2 laplacian = vec2(0.0);
            float eps = 0.1;
            
            laplacian.x = fbm(q + vec2(eps, 0.0)) + fbm(q - vec2(eps, 0.0)) - 2.0 * a;
            laplacian.y = fbm(q + vec2(0.0, eps)) + fbm(q - vec2(0.0, eps)) - 2.0 * a;
            
            float feed = 0.055;
            float kill = 0.062;
            
            float reaction = a * b * b;
            float diffusion = length(laplacian) * 0.5;
            
            return a - reaction + feed * (1.0 - a) + diffusion;
        }
        
        void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution.xy;
            vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.x, u_resolution.y);
            
            float t = u_time * 0.2;
            
            vec2 mousePos = (u_mouse * 2.0 - 1.0) * vec2(u_resolution.x / u_resolution.y, 1.0);
            float mouseDist = length(p - mousePos);
            
            vec2 warpedP = p;
            warpedP += vec2(
                sin(t * 0.5 + p.y * 3.0) * 0.1,
                cos(t * 0.4 + p.x * 3.0) * 0.1
            );
            
            float rd = reactionDiffusion(warpedP, t);
            
            float pattern = 0.0;
            for (int i = 0; i < 3; i++) {
                float fi = float(i);
                vec2 offset = vec2(sin(t + fi * 2.0), cos(t + fi * 1.5)) * 0.3;
                float layer = reactionDiffusion(warpedP + offset, t + fi * 0.5);
                pattern += layer * (1.0 / (fi + 1.0));
            }
            
            pattern = pattern / 3.0;
            pattern = smoothstep(0.3, 0.7, pattern);
            
            float coral = fbm(warpedP * 6.0 + t * 0.1);
            coral = pow(coral, 2.0);
            
            vec3 col = deepBlue;
            
            vec3 patternColor = mix(color1, color2, fract(pattern * 3.0 + t * 0.2));
            col = mix(col, patternColor, pattern * 0.8);
            
            float coralMask = smoothstep(0.4, 0.6, coral);
            col = mix(col, color1 * 1.2, coralMask * 0.5);
            
            float pulse = 0.5 + 0.5 * sin(t * 2.0 + pattern * 10.0);
            col += patternColor * pulse * pattern * 0.3;
            
            if (mouseDist < 0.3) {
                float mouseGlow = exp(-mouseDist * 8.0);
                col += color1 * mouseGlow * 0.5;
                
                float ripple = sin(mouseDist * 20.0 - t * 5.0) * 0.5 + 0.5;
                col += color2 * ripple * mouseGlow * 0.3;
            }
            
            float vignette = 1.0 - length(uv - 0.5) * 0.8;
            col *= vignette;
            
            col = pow(col, vec3(0.9));
            
            gl_FragColor = vec4(col, 1.0);
        }
        `;
        
        function compileShader(source, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            
            return shader;
        }
        
        const vertexShader = compileShader(vertexShaderSource, gl.VERTEX_SHADER);
        const fragmentShader = compileShader(fragmentShaderSource, gl.FRAGMENT_SHADER);
        
        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
        }
        
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        const positions = new Float32Array([
            -1, -1,
             1, -1,
            -1,  1,
             1,  1,
        ]);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
        
        const positionLocation = gl.getAttribLocation(program, 'a_position');
        const timeLocation = gl.getUniformLocation(program, 'u_time');
        const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
        const mouseLocation = gl.getUniformLocation(program, 'u_mouse');
        
        let mouse = { x: 0.5, y: 0.5 };
        let startTime = Date.now();
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        window.addEventListener('pointermove', (e) => {
            mouse.x = e.clientX / window.innerWidth;
            mouse.y = 1.0 - (e.clientY / window.innerHeight);
        });
        
        let lastMoveTime = Date.now();
        const overlay = document.getElementById('overlay');
        const controls = document.getElementById('controls');
        
        window.addEventListener('pointermove', () => {
            lastMoveTime = Date.now();
            overlay.classList.remove('hidden');
            controls.classList.remove('hidden');
        });
        
        setInterval(() => {
            if (Date.now() - lastMoveTime > 2000) {
                overlay.classList.add('hidden');
                controls.classList.add('hidden');
            }
        }, 100);
        
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
        
        function render() {
            const time = (Date.now() - startTime) / 1000;
            
            gl.useProgram(program);
            
            gl.enableVertexAttribArray(positionLocation);
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
            
            gl.uniform1f(timeLocation, time);
            gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
            gl.uniform2f(mouseLocation, mouse.x, mouse.y);
            
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            
            requestAnimationFrame(render);
        }
        
        render();
    </script>
</body>
</html>
