<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadal Vortex — Deep Ocean Bioluminescence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            color: white;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .overlay h1 {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }
        
        .controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        
        .controls.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        button {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            color: #00d4ff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        button:hover {
            background: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .back-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }
        
        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>
    
    <div class="overlay" id="overlay">
        <a href="../index.html" class="back-link">← Back to Gallery</a>
        <h1>Hadal Vortex</h1>
        <p>Domain Warping + Kaleidoscope • Mouse controls spiral intensity</p>
    </div>
    
    <div class="controls" id="controls">
        <button id="fullscreenBtn">Fullscreen</button>
    </div>
    
    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        
        if (!gl) {
            alert('WebGL not supported');
            throw new Error('WebGL not supported');
        }
        
        const isWebGL2 = gl instanceof WebGL2RenderingContext;
        
        const vertexShaderSource = isWebGL2 ? `#version 300 es
        in vec2 a_position;
        void main() {
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
        ` : `
        attribute vec2 a_position;
        void main() {
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
        `;
        
        const fragmentShaderSource = isWebGL2 ? `#version 300 es
        precision highp float;
        
        uniform float u_time;
        uniform vec2 u_resolution;
        uniform vec2 u_mouse;
        
        out vec4 fragColor;
        
        const vec3 color1 = vec3(0.0, 0.831, 1.0);      // #00d4ff
        const vec3 color2 = vec3(0.0, 1.0, 0.639);      // #00ffa3
        const vec3 deepBlue = vec3(0.039, 0.055, 0.153); // #0a0e27
        
        const float PI = 3.14159265359;
        
        float hash(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }
        
        float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            
            float a = hash(i);
            float b = hash(i + vec2(1.0, 0.0));
            float c = hash(i + vec2(0.0, 1.0));
            float d = hash(i + vec2(1.0, 1.0));
            
            return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
        }
        
        float fbm(vec2 p) {
            float value = 0.0;
            float amplitude = 0.5;
            float frequency = 1.0;
            
            for (int i = 0; i < 7; i++) {
                value += amplitude * noise(p * frequency);
                frequency *= 2.0;
                amplitude *= 0.5;
            }
            
            return value;
        }
        
        vec2 domainWarp(vec2 p, float t) {
            vec2 q = vec2(
                fbm(p + vec2(0.0, 0.0)),
                fbm(p + vec2(5.2, 1.3))
            );
            
            vec2 r = vec2(
                fbm(p + 4.0 * q + vec2(1.7, 9.2) + t * 0.15),
                fbm(p + 4.0 * q + vec2(8.3, 2.8) + t * 0.12)
            );
            
            vec2 s = vec2(
                fbm(p + 4.0 * r + vec2(3.1, 7.4) + t * 0.1),
                fbm(p + 4.0 * r + vec2(6.7, 4.2) + t * 0.08)
            );
            
            return p + s * 0.5;
        }
        
        vec2 kaleidoscope(vec2 p, float segments) {
            float angle = atan(p.y, p.x);
            float radius = length(p);
            
            float segmentAngle = 2.0 * PI / segments;
            angle = mod(angle, segmentAngle);
            
            if (mod(floor(atan(p.y, p.x) / segmentAngle), 2.0) == 0.0) {
                angle = segmentAngle - angle;
            }
            
            return vec2(cos(angle), sin(angle)) * radius;
        }
        
        void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution.xy;
            vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.x, u_resolution.y);
            
            float t = u_time * 0.3;
            
            vec2 mouseInfluence = (u_mouse - 0.5) * 2.0;
            float mouseIntensity = length(mouseInfluence);
            
            float segments = 6.0 + mouseIntensity * 6.0;
            
            float radius = length(p);
            float angle = atan(p.y, p.x);
            
            float spiral = angle + radius * 3.0 - t * 2.0;
            p = vec2(cos(spiral), sin(spiral)) * radius;
            
            p = kaleidoscope(p, segments);
            
            vec2 warped1 = domainWarp(p * 2.0, t);
            vec2 warped2 = domainWarp(warped1, t + 1.0);
            vec2 warped3 = domainWarp(warped2, t + 2.0);
            
            float pattern = fbm(warped3 * 3.0);
            
            float vortexPull = exp(-radius * 1.5);
            pattern = mix(pattern, 1.0, vortexPull * 0.5);
            
            vec3 col = deepBlue;
            
            vec3 warpColor = mix(color1, color2, fract(pattern * 5.0 + t * 0.5));
            col = mix(col, warpColor, smoothstep(0.3, 0.7, pattern));
            
            float ridges = abs(sin(pattern * 20.0 + t * 2.0));
            ridges = pow(ridges, 3.0);
            col += mix(color1, color2, fract(ridges * 3.0)) * ridges * 0.6;
            
            float centerGlow = exp(-radius * 2.0);
            col += color2 * centerGlow * 0.8;
            
            float spiralGlow = smoothstep(0.1, 0.0, abs(fract(spiral / (2.0 * PI)) - 0.5));
            col += color1 * spiralGlow * 0.4;
            
            float kaleidoEdges = smoothstep(0.02, 0.0, abs(fract(angle * segments / (2.0 * PI)) - 0.5));
            col += mix(color1, color2, fract(t)) * kaleidoEdges * 0.5;
            
            float pulse = 0.5 + 0.5 * sin(t * 3.0 - radius * 5.0);
            col += warpColor * pulse * pattern * 0.2;
            
            float vignette = 1.0 - radius * 0.6;
            vignette = smoothstep(0.0, 1.0, vignette);
            col *= vignette;
            
            col = pow(col, vec3(0.85));
            
            fragColor = vec4(col, 1.0);
        }
        ` : `
        precision highp float;
        
        uniform float u_time;
        uniform vec2 u_resolution;
        uniform vec2 u_mouse;
        
        const vec3 color1 = vec3(0.0, 0.831, 1.0);
        const vec3 color2 = vec3(0.0, 1.0, 0.639);
        const vec3 deepBlue = vec3(0.039, 0.055, 0.153);
        
        const float PI = 3.14159265359;
        
        float hash(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }
        
        float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            
            float a = hash(i);
            float b = hash(i + vec2(1.0, 0.0));
            float c = hash(i + vec2(0.0, 1.0));
            float d = hash(i + vec2(1.0, 1.0));
            
            return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
        }
        
        float fbm(vec2 p) {
            float value = 0.0;
            float amplitude = 0.5;
            float frequency = 1.0;
            
            for (int i = 0; i < 7; i++) {
                value += amplitude * noise(p * frequency);
                frequency *= 2.0;
                amplitude *= 0.5;
            }
            
            return value;
        }
        
        vec2 domainWarp(vec2 p, float t) {
            vec2 q = vec2(
                fbm(p + vec2(0.0, 0.0)),
                fbm(p + vec2(5.2, 1.3))
            );
            
            vec2 r = vec2(
                fbm(p + 4.0 * q + vec2(1.7, 9.2) + t * 0.15),
                fbm(p + 4.0 * q + vec2(8.3, 2.8) + t * 0.12)
            );
            
            vec2 s = vec2(
                fbm(p + 4.0 * r + vec2(3.1, 7.4) + t * 0.1),
                fbm(p + 4.0 * r + vec2(6.7, 4.2) + t * 0.08)
            );
            
            return p + s * 0.5;
        }
        
        vec2 kaleidoscope(vec2 p, float segments) {
            float angle = atan(p.y, p.x);
            float radius = length(p);
            
            float segmentAngle = 2.0 * PI / segments;
            angle = mod(angle, segmentAngle);
            
            if (mod(floor(atan(p.y, p.x) / segmentAngle), 2.0) == 0.0) {
                angle = segmentAngle - angle;
            }
            
            return vec2(cos(angle), sin(angle)) * radius;
        }
        
        void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution.xy;
            vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.x, u_resolution.y);
            
            float t = u_time * 0.3;
            
            vec2 mouseInfluence = (u_mouse - 0.5) * 2.0;
            float mouseIntensity = length(mouseInfluence);
            
            float segments = 6.0 + mouseIntensity * 6.0;
            
            float radius = length(p);
            float angle = atan(p.y, p.x);
            
            float spiral = angle + radius * 3.0 - t * 2.0;
            p = vec2(cos(spiral), sin(spiral)) * radius;
            
            p = kaleidoscope(p, segments);
            
            vec2 warped1 = domainWarp(p * 2.0, t);
            vec2 warped2 = domainWarp(warped1, t + 1.0);
            vec2 warped3 = domainWarp(warped2, t + 2.0);
            
            float pattern = fbm(warped3 * 3.0);
            
            float vortexPull = exp(-radius * 1.5);
            pattern = mix(pattern, 1.0, vortexPull * 0.5);
            
            vec3 col = deepBlue;
            
            vec3 warpColor = mix(color1, color2, fract(pattern * 5.0 + t * 0.5));
            col = mix(col, warpColor, smoothstep(0.3, 0.7, pattern));
            
            float ridges = abs(sin(pattern * 20.0 + t * 2.0));
            ridges = pow(ridges, 3.0);
            col += mix(color1, color2, fract(ridges * 3.0)) * ridges * 0.6;
            
            float centerGlow = exp(-radius * 2.0);
            col += color2 * centerGlow * 0.8;
            
            float spiralGlow = smoothstep(0.1, 0.0, abs(fract(spiral / (2.0 * PI)) - 0.5));
            col += color1 * spiralGlow * 0.4;
            
            float kaleidoEdges = smoothstep(0.02, 0.0, abs(fract(angle * segments / (2.0 * PI)) - 0.5));
            col += mix(color1, color2, fract(t)) * kaleidoEdges * 0.5;
            
            float pulse = 0.5 + 0.5 * sin(t * 3.0 - radius * 5.0);
            col += warpColor * pulse * pattern * 0.2;
            
            float vignette = 1.0 - radius * 0.6;
            vignette = smoothstep(0.0, 1.0, vignette);
            col *= vignette;
            
            col = pow(col, vec3(0.85));
            
            gl_FragColor = vec4(col, 1.0);
        }
        `;
        
        function compileShader(source, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            
            return shader;
        }
        
        const vertexShader = compileShader(vertexShaderSource, gl.VERTEX_SHADER);
        const fragmentShader = compileShader(fragmentShaderSource, gl.FRAGMENT_SHADER);
        
        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
        }
        
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        const positions = new Float32Array([
            -1, -1,
             1, -1,
            -1,  1,
             1,  1,
        ]);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
        
        const positionLocation = gl.getAttribLocation(program, 'a_position');
        const timeLocation = gl.getUniformLocation(program, 'u_time');
        const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
        const mouseLocation = gl.getUniformLocation(program, 'u_mouse');
        
        let mouse = { x: 0.5, y: 0.5 };
        let startTime = Date.now();
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        window.addEventListener('pointermove', (e) => {
            mouse.x = e.clientX / window.innerWidth;
            mouse.y = 1.0 - (e.clientY / window.innerHeight);
        });
        
        let lastMoveTime = Date.now();
        const overlay = document.getElementById('overlay');
        const controls = document.getElementById('controls');
        
        window.addEventListener('pointermove', () => {
            lastMoveTime = Date.now();
            overlay.classList.remove('hidden');
            controls.classList.remove('hidden');
        });
        
        setInterval(() => {
            if (Date.now() - lastMoveTime > 2000) {
                overlay.classList.add('hidden');
                controls.classList.add('hidden');
            }
        }, 100);
        
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
        
        function render() {
            const time = (Date.now() - startTime) / 1000;
            
            gl.useProgram(program);
            
            gl.enableVertexAttribArray(positionLocation);
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
            
            gl.uniform1f(timeLocation, time);
            gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
            gl.uniform2f(mouseLocation, mouse.x, mouse.y);
            
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            
            requestAnimationFrame(render);
        }
        
        render();
    </script>
</body>
</html>
