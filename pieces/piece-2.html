<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plankton Constellation — Deep Ocean Bioluminescence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            color: white;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .overlay h1 {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }
        
        .controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        
        .controls.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        button {
            background: rgba(0, 255, 163, 0.2);
            border: 1px solid rgba(0, 255, 163, 0.5);
            color: #00ffa3;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        button:hover {
            background: rgba(0, 255, 163, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 163, 0.5);
        }
        
        .back-link {
            color: #00ffa3;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }
        
        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>
    
    <div class="overlay" id="overlay">
        <a href="../index.html" class="back-link">← Back to Gallery</a>
        <h1>Plankton Constellation</h1>
        <p>Voronoi + Metaballs • Mouse attracts organisms</p>
    </div>
    
    <div class="controls" id="controls">
        <button id="fullscreenBtn">Fullscreen</button>
    </div>
    
    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        
        if (!gl) {
            alert('WebGL not supported');
            throw new Error('WebGL not supported');
        }
        
        const isWebGL2 = gl instanceof WebGL2RenderingContext;
        
        const vertexShaderSource = isWebGL2 ? `#version 300 es
        in vec2 a_position;
        void main() {
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
        ` : `
        attribute vec2 a_position;
        void main() {
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
        `;
        
        const fragmentShaderSource = isWebGL2 ? `#version 300 es
        precision highp float;
        
        uniform float u_time;
        uniform vec2 u_resolution;
        uniform vec2 u_mouse;
        
        out vec4 fragColor;
        
        const vec3 color1 = vec3(0.0, 1.0, 0.639);      // #00ffa3
        const vec3 color2 = vec3(0.0, 0.831, 1.0);      // #00d4ff
        const vec3 deepBlue = vec3(0.039, 0.055, 0.153); // #0a0e27
        
        float hash(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }
        
        vec2 hash2(vec2 p) {
            p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
            return fract(sin(p) * 43758.5453);
        }
        
        float voronoi(vec2 p, out vec2 cellId) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            
            float minDist = 1.0;
            cellId = vec2(0.0);
            
            for (int y = -1; y <= 1; y++) {
                for (int x = -1; x <= 1; x++) {
                    vec2 neighbor = vec2(float(x), float(y));
                    vec2 point = hash2(i + neighbor);
                    point = 0.5 + 0.5 * sin(u_time * 0.5 + 6.2831 * point);
                    
                    vec2 diff = neighbor + point - f;
                    float dist = length(diff);
                    
                    if (dist < minDist) {
                        minDist = dist;
                        cellId = i + neighbor;
                    }
                }
            }
            
            return minDist;
        }
        
        float voronoiEdge(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            
            float minDist1 = 1.0;
            float minDist2 = 1.0;
            
            for (int y = -1; y <= 1; y++) {
                for (int x = -1; x <= 1; x++) {
                    vec2 neighbor = vec2(float(x), float(y));
                    vec2 point = hash2(i + neighbor);
                    point = 0.5 + 0.5 * sin(u_time * 0.5 + 6.2831 * point);
                    
                    vec2 diff = neighbor + point - f;
                    float dist = length(diff);
                    
                    if (dist < minDist1) {
                        minDist2 = minDist1;
                        minDist1 = dist;
                    } else if (dist < minDist2) {
                        minDist2 = dist;
                    }
                }
            }
            
            return minDist2 - minDist1;
        }
        
        float metaball(vec2 p, vec2 center, float radius) {
            float dist = length(p - center);
            return radius / (dist * dist + 0.01);
        }
        
        void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution.xy;
            vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.x, u_resolution.y);
            
            float t = u_time * 0.3;
            
            vec2 mousePos = (u_mouse * 2.0 - 1.0) * vec2(u_resolution.x / u_resolution.y, 1.0);
            
            vec2 cellId;
            float voronoiDist = voronoi(p * 4.0 + t * 0.2, cellId);
            float edges = voronoiEdge(p * 4.0 + t * 0.2);
            
            float metaballs = 0.0;
            const int numBalls = 20;
            
            for (int i = 0; i < numBalls; i++) {
                float fi = float(i);
                vec2 seed = vec2(fi * 12.34, fi * 56.78);
                vec2 offset = hash2(seed) * 2.0 - 1.0;
                
                vec2 center = vec2(
                    sin(t * 0.7 + fi * 0.5) * 0.8,
                    cos(t * 0.5 + fi * 0.7) * 0.8
                ) + offset * 0.3;
                
                vec2 toMouse = mousePos - center;
                float mouseDist = length(toMouse);
                if (mouseDist < 1.5) {
                    center += normalize(toMouse) * (1.5 - mouseDist) * 0.3;
                }
                
                float size = 0.15 + 0.1 * sin(t * 2.0 + fi * 2.0);
                metaballs += metaball(p, center, size);
            }
            
            metaballs = smoothstep(0.5, 1.5, metaballs);
            
            float cellHash = hash(cellId);
            vec3 cellColor = mix(color1, color2, cellHash);
            
            vec3 col = deepBlue;
            
            col = mix(col, cellColor * 0.3, smoothstep(0.15, 0.1, voronoiDist));
            
            float edgeGlow = smoothstep(0.05, 0.0, edges);
            col += cellColor * edgeGlow * 0.8;
            
            col = mix(col, cellColor, metaballs * 0.7);
            
            float metaballGlow = smoothstep(1.0, 0.3, metaballs) * metaballs;
            col += mix(color1, color2, fract(metaballs * 3.0)) * metaballGlow * 0.5;
            
            float sparkle = 0.0;
            for (int i = 0; i < 30; i++) {
                float fi = float(i);
                vec2 sparklePos = hash2(vec2(fi * 7.89, fi * 3.21)) * 2.0 - 1.0;
                sparklePos *= 1.5;
                sparklePos.x += sin(t * 1.5 + fi) * 0.2;
                sparklePos.y += cos(t * 1.2 + fi) * 0.2;
                
                float dist = length(p - sparklePos);
                float pulse = 0.5 + 0.5 * sin(t * 3.0 + fi * 2.0);
                sparkle += exp(-dist * 50.0) * pulse;
            }
            
            col += color1 * sparkle * 0.6;
            
            float vignette = 1.0 - length(uv - 0.5) * 0.7;
            col *= vignette;
            
            col = pow(col, vec3(0.9));
            
            fragColor = vec4(col, 1.0);
        }
        ` : `
        precision highp float;
        
        uniform float u_time;
        uniform vec2 u_resolution;
        uniform vec2 u_mouse;
        
        const vec3 color1 = vec3(0.0, 1.0, 0.639);
        const vec3 color2 = vec3(0.0, 0.831, 1.0);
        const vec3 deepBlue = vec3(0.039, 0.055, 0.153);
        
        float hash(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }
        
        vec2 hash2(vec2 p) {
            p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
            return fract(sin(p) * 43758.5453);
        }
        
        float voronoi(vec2 p, out vec2 cellId) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            
            float minDist = 1.0;
            cellId = vec2(0.0);
            
            for (int y = -1; y <= 1; y++) {
                for (int x = -1; x <= 1; x++) {
                    vec2 neighbor = vec2(float(x), float(y));
                    vec2 point = hash2(i + neighbor);
                    point = 0.5 + 0.5 * sin(u_time * 0.5 + 6.2831 * point);
                    
                    vec2 diff = neighbor + point - f;
                    float dist = length(diff);
                    
                    if (dist < minDist) {
                        minDist = dist;
                        cellId = i + neighbor;
                    }
                }
            }
            
            return minDist;
        }
        
        float voronoiEdge(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            
            float minDist1 = 1.0;
            float minDist2 = 1.0;
            
            for (int y = -1; y <= 1; y++) {
                for (int x = -1; x <= 1; x++) {
                    vec2 neighbor = vec2(float(x), float(y));
                    vec2 point = hash2(i + neighbor);
                    point = 0.5 + 0.5 * sin(u_time * 0.5 + 6.2831 * point);
                    
                    vec2 diff = neighbor + point - f;
                    float dist = length(diff);
                    
                    if (dist < minDist1) {
                        minDist2 = minDist1;
                        minDist1 = dist;
                    } else if (dist < minDist2) {
                        minDist2 = dist;
                    }
                }
            }
            
            return minDist2 - minDist1;
        }
        
        float metaball(vec2 p, vec2 center, float radius) {
            float dist = length(p - center);
            return radius / (dist * dist + 0.01);
        }
        
        void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution.xy;
            vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.x, u_resolution.y);
            
            float t = u_time * 0.3;
            
            vec2 mousePos = (u_mouse * 2.0 - 1.0) * vec2(u_resolution.x / u_resolution.y, 1.0);
            
            vec2 cellId;
            float voronoiDist = voronoi(p * 4.0 + t * 0.2, cellId);
            float edges = voronoiEdge(p * 4.0 + t * 0.2);
            
            float metaballs = 0.0;
            const int numBalls = 20;
            
            for (int i = 0; i < numBalls; i++) {
                float fi = float(i);
                vec2 seed = vec2(fi * 12.34, fi * 56.78);
                vec2 offset = hash2(seed) * 2.0 - 1.0;
                
                vec2 center = vec2(
                    sin(t * 0.7 + fi * 0.5) * 0.8,
                    cos(t * 0.5 + fi * 0.7) * 0.8
                ) + offset * 0.3;
                
                vec2 toMouse = mousePos - center;
                float mouseDist = length(toMouse);
                if (mouseDist < 1.5) {
                    center += normalize(toMouse) * (1.5 - mouseDist) * 0.3;
                }
                
                float size = 0.15 + 0.1 * sin(t * 2.0 + fi * 2.0);
                metaballs += metaball(p, center, size);
            }
            
            metaballs = smoothstep(0.5, 1.5, metaballs);
            
            float cellHash = hash(cellId);
            vec3 cellColor = mix(color1, color2, cellHash);
            
            vec3 col = deepBlue;
            
            col = mix(col, cellColor * 0.3, smoothstep(0.15, 0.1, voronoiDist));
            
            float edgeGlow = smoothstep(0.05, 0.0, edges);
            col += cellColor * edgeGlow * 0.8;
            
            col = mix(col, cellColor, metaballs * 0.7);
            
            float metaballGlow = smoothstep(1.0, 0.3, metaballs) * metaballs;
            col += mix(color1, color2, fract(metaballs * 3.0)) * metaballGlow * 0.5;
            
            float sparkle = 0.0;
            for (int i = 0; i < 30; i++) {
                float fi = float(i);
                vec2 sparklePos = hash2(vec2(fi * 7.89, fi * 3.21)) * 2.0 - 1.0;
                sparklePos *= 1.5;
                sparklePos.x += sin(t * 1.5 + fi) * 0.2;
                sparklePos.y += cos(t * 1.2 + fi) * 0.2;
                
                float dist = length(p - sparklePos);
                float pulse = 0.5 + 0.5 * sin(t * 3.0 + fi * 2.0);
                sparkle += exp(-dist * 50.0) * pulse;
            }
            
            col += color1 * sparkle * 0.6;
            
            float vignette = 1.0 - length(uv - 0.5) * 0.7;
            col *= vignette;
            
            col = pow(col, vec3(0.9));
            
            gl_FragColor = vec4(col, 1.0);
        }
        `;
        
        function compileShader(source, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            
            return shader;
        }
        
        const vertexShader = compileShader(vertexShaderSource, gl.VERTEX_SHADER);
        const fragmentShader = compileShader(fragmentShaderSource, gl.FRAGMENT_SHADER);
        
        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
        }
        
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        const positions = new Float32Array([
            -1, -1,
             1, -1,
            -1,  1,
             1,  1,
        ]);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
        
        const positionLocation = gl.getAttribLocation(program, 'a_position');
        const timeLocation = gl.getUniformLocation(program, 'u_time');
        const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
        const mouseLocation = gl.getUniformLocation(program, 'u_mouse');
        
        let mouse = { x: 0.5, y: 0.5 };
        let startTime = Date.now();
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        window.addEventListener('pointermove', (e) => {
            mouse.x = e.clientX / window.innerWidth;
            mouse.y = 1.0 - (e.clientY / window.innerHeight);
        });
        
        let lastMoveTime = Date.now();
        const overlay = document.getElementById('overlay');
        const controls = document.getElementById('controls');
        
        window.addEventListener('pointermove', () => {
            lastMoveTime = Date.now();
            overlay.classList.remove('hidden');
            controls.classList.remove('hidden');
        });
        
        setInterval(() => {
            if (Date.now() - lastMoveTime > 2000) {
                overlay.classList.add('hidden');
                controls.classList.add('hidden');
            }
        }, 100);
        
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
        
        function render() {
            const time = (Date.now() - startTime) / 1000;
            
            gl.useProgram(program);
            
            gl.enableVertexAttribArray(positionLocation);
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
            
            gl.uniform1f(timeLocation, time);
            gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
            gl.uniform2f(mouseLocation, mouse.x, mouse.y);
            
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            
            requestAnimationFrame(render);
        }
        
        render();
    </script>
</body>
</html>
